<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Portfolio Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body class="bg-slate-950 text-slate-200 font-sans antialiased">

    <div class="max-w-md mx-auto p-4 min-h-screen flex flex-col">
        <header class="py-6">
            <h1 class="text-2xl font-extrabold tracking-tight text-white">Portfolio Performance</h1>
            <p class="text-sm text-slate-400 font-medium">Total Cost vs. Market Value + Dividends</p>
        </header>

        <div class="bg-slate-900 p-4 rounded-3xl shadow-xl border border-slate-800 mb-6">
            <div class="h-64">
                <canvas id="performanceChart"></canvas>
            </div>
        </div>

        <div class="mb-6">
            <h3 class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3 px-1">Current Holdings</h3>
            <div id="holdingsList" class="space-y-2"></div>
        </div>

        <div id="summaryCards" class="grid grid-cols-2 gap-3 mb-6"></div>

        <div class="mt-auto pb-8 space-y-3">
            <button onclick="toggleModal('entry', true)" class="w-full bg-blue-600 hover:bg-blue-500 text-white py-4 rounded-2xl font-bold shadow-lg transition-all active:scale-[0.98]">
                Add or Update Position
            </button>
        </div>
    </div>

    <div id="modal" class="fixed inset-0 bg-slate-950/90 backdrop-blur-sm hidden items-end sm:items-center justify-center z-50 p-4">
        <div class="bg-slate-900 w-full max-w-sm rounded-3xl p-6 border border-slate-800 shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold text-white">Update Share</h2>
                <button onclick="toggleModal('entry', false)" class="text-slate-500 hover:text-white">✕</button>
            </div>
            <div class="space-y-4">
                <input type="text" id="ticker" placeholder="Ticker (e.g. AAPL)" class="w-full p-4 bg-slate-950 text-white border border-slate-800 rounded-2xl outline-none">
                <div class="grid grid-cols-2 gap-3">
                    <input type="number" id="shares" placeholder="Shares" class="w-full p-4 bg-slate-950 text-white border border-slate-800 rounded-2xl outline-none">
                    <input type="number" id="cost" placeholder="Cost/Sh" class="w-full p-4 bg-slate-950 text-white border border-slate-800 rounded-2xl outline-none">
                </div>
                <input type="number" id="marketValue" placeholder="Current Price" class="w-full p-4 bg-slate-950 text-white border border-slate-800 rounded-2xl outline-none">
                <button onclick="handleSave()" class="w-full bg-white text-slate-900 py-4 rounded-2xl font-bold">Save Position</button>
            </div>
        </div>
    </div>

    <div id="divModal" class="fixed inset-0 bg-slate-950/90 backdrop-blur-sm hidden items-end sm:items-center justify-center z-50 p-4">
        <div class="bg-slate-900 w-full max-w-sm rounded-3xl p-6 border border-slate-800 shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <h2 id="divTitle" class="text-xl font-bold text-white font-mono">Add Dividend</h2>
                <button onclick="toggleModal('dividend', false)" class="text-slate-500 hover:text-white">✕</button>
            </div>
            <div class="space-y-4">
                <p class="text-slate-400 text-sm">Enter the total dividend amount received for this position.</p>
                <input type="number" id="divAmount" placeholder="Amount ($)" class="w-full p-4 bg-slate-950 text-white border border-slate-800 rounded-2xl outline-none">
                <input type="hidden" id="divTarget">
                <button onclick="saveDividend()" class="w-full bg-emerald-500 text-white py-4 rounded-2xl font-bold">Log Dividend</button>
            </div>
        </div>
    </div>

    <script>
        let portfolio = JSON.parse(localStorage.getItem('portfolio')) || {};
        let history = JSON.parse(localStorage.getItem('history')) || [];

        function toggleModal(type, show) {
            const el = type === 'entry' ? document.getElementById('modal') : document.getElementById('divModal');
            el.classList.toggle('hidden', !show);
            el.classList.toggle('flex', show);
        }

        function openDivModal(ticker) {
            document.getElementById('divTarget').value = ticker;
            document.getElementById('divTitle').innerText = `$ Dividend: ${ticker}`;
            toggleModal('dividend', true);
        }

        function saveDividend() {
            const ticker = document.getElementById('divTarget').value;
            const amount = parseFloat(document.getElementById('divAmount').value);
            if(isNaN(amount)) return;

            // Ensure ticker exists and add dividend
            if(portfolio[ticker]) {
                portfolio[ticker].dividends = (portfolio[ticker].dividends || 0) + amount;
                localStorage.setItem('portfolio', JSON.stringify(portfolio));
                updateHistoryAndRender();
                toggleModal('dividend', false);
                document.getElementById('divAmount').value = '';
            }
        }

        function handleSave() {
            const ticker = document.getElementById('ticker').value.toUpperCase().trim();
            const shares = parseFloat(document.getElementById('shares').value);
            const cost = parseFloat(document.getElementById('cost').value);
            const marketValue = parseFloat(document.getElementById('marketValue').value);

            if (!ticker || isNaN(shares)) return;

            // Keep existing dividends if updating
            const existingDivs = portfolio[ticker] ? (portfolio[ticker].dividends || 0) : 0;

            portfolio[ticker] = { shares, cost, marketValue, dividends: existingDivs };
            localStorage.setItem('portfolio', JSON.stringify(portfolio));
            
            updateHistoryAndRender();
            toggleModal('entry', false);
        }

        function deletePosition(ticker) {
            if(confirm(`Delete ${ticker}?`)) {
                delete portfolio[ticker];
                localStorage.setItem('portfolio', JSON.stringify(portfolio));
                updateHistoryAndRender();
            }
        }

        function updateHistoryAndRender() {
            const today = new Date().toLocaleDateString();
            let totalCost = 0;
            let totalValuePlusDivs = 0;

            Object.values(portfolio).forEach(s => {
                totalCost += (s.cost * s.shares);
                totalValuePlusDivs += (s.marketValue * s.shares) + (s.dividends || 0);
            });

            const entry = { date: today, totalCost, totalValue: totalValuePlusDivs };
            const idx = history.findIndex(h => h.date === today);
            if (idx > -1) history[idx] = entry; else history.push(entry);

            localStorage.setItem('history', JSON.stringify(history));
            renderAll();
        }

        function renderHoldings() {
            const list = document.getElementById('holdingsList');
            const tickers = Object.keys(portfolio);
            
            if (tickers.length === 0) {
                list.innerHTML = `<p class="text-sm text-slate-600 italic py-4">No positions yet.</p>`;
                return;
            }
        
            list.innerHTML = tickers.map(ticker => {
                const s = portfolio[ticker];
                const divs = s.dividends || 0;
                const profit = ((s.marketValue - s.cost) * s.shares) + divs;
                
                return `
                    <div class="bg-slate-900 p-4 rounded-2xl border border-slate-800 flex justify-between items-center">
                        <div>
                            <div class="flex items-center gap-2">
                                <span class="font-bold text-white text-base">${ticker}</span>
                                <span class="text-[10px] bg-slate-800 px-1.5 py-0.5 rounded font-bold text-slate-400">${s.shares} SH</span>
                            </div>
                            <div class="text-[11px] mt-1 flex gap-2 items-center">
                                <span class="text-slate-500 italic">Cost: $${s.cost.toFixed(2)}</span>
                                <span class="text-slate-700">•</span>
                                <span class="text-emerald-500 font-bold">Divs: $${divs.toFixed(2)}</span>
                            </div>
                        </div>
                        <div class="flex items-center gap-3">
                            <div class="text-right">
                                <p class="text-sm font-bold ${profit >= 0 ? 'text-emerald-400' : 'text-rose-400'}">
                                    $${profit.toLocaleString(undefined, {minimumFractionDigits: 2})}
                                </p>
                            </div>
                            <button onclick="openDivModal('${ticker}')" class="w-8 h-8 flex items-center justify-center bg-slate-800 hover:bg-slate-700 active:scale-90 transition-all rounded-full text-emerald-400 font-bold text-sm">$</button>
                            <button onclick="deletePosition('${ticker}')" class="text-slate-700 hover:text-rose-500 p-1">
                                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="currentColor" viewBox="0 0 16 16">
                                  <path d="M4.646 4.646a.5.5 0 0 1 .708 0L8 7.293l2.646-2.647a.5.5 0 0 1 .708.708L8.707 8l2.647 2.646a.5.5 0 0 1-.708.708L8 8.707l-2.646 2.647a.5.5 0 0 1-.708-.708L7.293 8 4.646 10.646a.5.5 0 0 1 0-.708L7.293 8 4.646 5.354a.5.5 0 0 1 0-.708z"/>
                                </svg>
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderSummary() {
            let totalCost = 0;
            let totalValDiv = 0;
            Object.values(portfolio).forEach(s => {
                totalCost += (s.cost * s.shares);
                totalValDiv += (s.marketValue * s.shares) + (s.dividends || 0);
            });

            document.getElementById('summaryCards').innerHTML = `
                <div class="bg-slate-900 p-4 rounded-2xl border border-slate-800">
                    <p class="text-[10px] font-bold text-slate-500 uppercase tracking-wider">Total Cost</p>
                    <p class="text-lg font-bold text-slate-300">$${totalCost.toLocaleString()}</p>
                </div>
                <div class="bg-slate-900 p-4 rounded-2xl border border-slate-800 border-l-4 border-l-blue-500">
                    <p class="text-[10px] font-bold text-slate-500 uppercase tracking-wider">Total Value + Div</p>
                    <p class="text-lg font-bold text-blue-400">$${totalValDiv.toLocaleString()}</p>
                </div>
            `;
        }

        let chartInstance = null;
        function renderChart() {
            const ctx = document.getElementById('performanceChart').getContext('2d');
            const sortedHistory = [...history].sort((a,b) => new Date(a.date) - new Date(b.date));
            if (chartInstance) chartInstance.destroy();
            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: sortedHistory.map(h => h.date),
                    datasets: [
                        { label: 'Value + Div', data: sortedHistory.map(h => h.totalValue), borderColor: '#3b82f6', backgroundColor: 'rgba(59, 130, 246, 0.1)', fill: true, tension: 0.4 },
                        { label: 'Cost', data: sortedHistory.map(h => h.totalCost), borderColor: '#475569', borderDash: [5, 5], fill: false, tension: 0.4 }
                    ]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { ticks: { color: '#64748b' }, grid: { color: '#1e293b' } } } }
            });
        }

        function renderAll() { renderChart(); renderSummary(); renderHoldings(); }
        window.onload = renderAll;
    </script>
</body>
</html>
