<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Portfolio Tracker - Slate</title>
    <link rel="manifest" href="/manifest.json">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Portfolio">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2454/2454282.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-950 text-slate-200 font-sans antialiased">

    <div class="max-w-md mx-auto p-4 min-h-screen flex flex-col">
        <header class="py-6">
            <h1 class="text-2xl font-extrabold tracking-tight text-white">Portfolio Performance</h1>
            <p class="text-sm text-slate-400 font-medium">Total Cost vs. Market Value</p>
        </header>

        <div class="bg-slate-900 p-4 rounded-3xl shadow-xl border border-slate-800 mb-6">
            <div class="h-64">
                <canvas id="performanceChart"></canvas>
            </div>
        </div>

        <div class="mb-6">
            <div class="flex justify-between items-center mb-3 px-1">
                <h3 class="text-xs font-bold text-slate-500 uppercase tracking-wider">Current Holdings</h3>
            </div>
            <div id="holdingsList" class="space-y-2">
                </div>
        </div>

        <div id="summaryCards" class="grid grid-cols-2 gap-3 mb-6">
            </div>

        <div class="mt-auto pb-8 space-y-3">
            <button onclick="toggleModal(true)" class="w-full bg-blue-600 hover:bg-blue-500 text-white py-4 rounded-2xl font-bold shadow-lg shadow-blue-900/20 transition-all active:scale-[0.98]">
                Add or Update Position
            </button>
            <p class="text-center text-[10px] text-slate-600 uppercase font-bold tracking-widest">Local Browser Storage Only</p>
        </div>
    </div>

    <div id="modal" class="fixed inset-0 bg-slate-950/90 backdrop-blur-sm hidden items-end sm:items-center justify-center z-50 p-4 transition-all">
        <div class="bg-slate-900 w-full max-w-sm rounded-3xl p-6 border border-slate-800 shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold text-white">Update Share</h2>
                <button onclick="toggleModal(false)" class="text-slate-500 hover:text-white transition-colors">✕</button>
            </div>
            
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] font-bold text-slate-500 uppercase ml-1">Ticker Symbol</label>
                    <input type="text" id="ticker" placeholder="e.g. BTC" class="w-auto min-w-full p-4 bg-slate-950 text-white border border-slate-800 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="text-[10px] font-bold text-slate-500 uppercase ml-1">Shares</label>
                        <input type="number" id="shares" placeholder="0.00" class="w-full p-4 bg-slate-950 text-white border border-slate-800 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-500 uppercase ml-1">Cost/Share</label>
                        <input type="number" id="cost" placeholder="0.00" class="w-full p-4 bg-slate-950 text-white border border-slate-800 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-500 uppercase ml-1">Current Market Price</label>
                    <input type="number" id="marketValue" placeholder="0.00" class="w-full p-4 bg-slate-950 text-white border border-slate-800 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                
                <button onclick="handleSave()" class="w-full bg-white text-slate-900 py-4 rounded-2xl font-bold mt-2 hover:bg-slate-200 transition-colors">
                    Save Entry
                </button>
            </div>
        </div>
    </div>

    <script>
        let portfolio = JSON.parse(localStorage.getItem('portfolio')) || {};
        let history = JSON.parse(localStorage.getItem('history')) || [];

        function toggleModal(show) {
            const el = document.getElementById('modal');
            el.classList.toggle('hidden', !show);
            el.classList.toggle('flex', show);
        }

        function deletePosition(ticker) {
            if(confirm(`Delete all data for ${ticker}?`)) {
                delete portfolio[ticker];
                localStorage.setItem('portfolio', JSON.stringify(portfolio));
                updateHistoryAndRender();
            }
        }

        function handleSave() {
            const ticker = document.getElementById('ticker').value.toUpperCase().trim();
            const shares = parseFloat(document.getElementById('shares').value);
            const cost = parseFloat(document.getElementById('cost').value);
            const marketValue = parseFloat(document.getElementById('marketValue').value);

            if (!ticker || isNaN(shares) || isNaN(cost)) return alert("Please fill all fields");

            portfolio[ticker] = { shares, cost, marketValue };
            localStorage.setItem('portfolio', JSON.stringify(portfolio));
            
            updateHistoryAndRender();
            toggleModal(false);
            
            // Reset fields
            document.getElementById('ticker').value = '';
            document.getElementById('shares').value = '';
            document.getElementById('cost').value = '';
            document.getElementById('marketValue').value = '';
        }

        function updateHistoryAndRender() {
            const today = new Date().toLocaleDateString();
            let totalCost = 0;
            let totalValue = 0;

            Object.values(portfolio).forEach(s => {
                totalCost += (s.cost * s.shares);
                totalValue += (s.marketValue * s.shares);
            });

            const historyIdx = history.findIndex(h => h.date === today);
            const entry = { date: today, totalCost, totalValue };

            if (historyIdx > -1) {
                history[historyIdx] = entry;
            } else {
                history.push(entry);
            }

            localStorage.setItem('history', JSON.stringify(history));
            renderAll();
        }

        function renderAll() {
            renderChart();
            renderSummary();
            renderHoldings();
        }

        function renderHoldings() {
            const list = document.getElementById('holdingsList');
            const tickers = Object.keys(portfolio);
            
            if (tickers.length === 0) {
                list.innerHTML = `<p class="text-sm text-slate-600 italic py-4 ml-1">No positions added yet.</p>`;
                return;
            }

            list.innerHTML = tickers.map(ticker => {
                const s = portfolio[ticker];
                const profit = (s.marketValue - s.cost) * s.shares;
                const isProfit = profit >= 0;
                
                return `
                    <div class="bg-slate-900 p-4 rounded-2xl border border-slate-800 flex justify-between items-center group">
                        <div>
                            <div class="flex items-center gap-2">
                                <span class="font-bold text-white">${ticker}</span>
                                <span class="text-[10px] bg-slate-800 px-1.5 py-0.5 rounded font-bold text-slate-500">${s.shares} SH</span>
                            </div>
                            <div class="text-[11px] text-slate-500 mt-1">
                                Cost: $${s.cost.toLocaleString()} | Price: $${s.marketValue.toLocaleString()}
                            </div>
                        </div>
                        <div class="flex items-center gap-4">
                            <div class="text-right">
                                <p class="text-sm font-bold ${isProfit ? 'text-emerald-400' : 'text-rose-400'}">
                                    ${isProfit ? '+' : ''}$${profit.toLocaleString(undefined, {minimumFractionDigits: 2})}
                                </p>
                            </div>
                            <button onclick="deletePosition('${ticker}')" class="text-slate-700 hover:text-rose-500 transition-colors">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                                  <path d="M5.5 5.5A.5.5 0 0 1 6 6v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5m2.5 0a.5.5 0 0 1 .5.5v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5m3 .5a.5.5 0 0 0-1 0v6a.5.5 0 0 0 1 0z"/>
                                  <path d="M14.5 3a1 1 0 0 1-1 1H13v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V4h-.5a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1H6a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1h3.5a1 1 0 0 1 1 1zM4.118 4 4 4.059V13a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V4.059L11.882 4zM2.5 3h11V2h-11z"/>
                                </svg>
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderSummary() {
            let totalCost = 0;
            let totalValue = 0;
            Object.values(portfolio).forEach(s => {
                totalCost += (s.cost * s.shares);
                totalValue += (s.marketValue * s.shares);
            });

            document.getElementById('summaryCards').innerHTML = `
                <div class="bg-slate-900 p-4 rounded-2xl border border-slate-800">
                    <p class="text-[10px] font-bold text-slate-500 uppercase tracking-wider">Total Cost</p>
                    <p class="text-lg font-bold text-slate-300">$${totalCost.toLocaleString(undefined, {minimumFractionDigits: 2})}</p>
                </div>
                <div class="bg-slate-900 p-4 rounded-2xl border border-slate-800">
                    <p class="text-[10px] font-bold text-slate-500 uppercase tracking-wider">Net Value</p>
                    <p class="text-lg font-bold text-blue-400">$${totalValue.toLocaleString(undefined, {minimumFractionDigits: 2})}</p>
                </div>
            `;
        }

        let chartInstance = null;
        function renderChart() {
            const ctx = document.getElementById('performanceChart').getContext('2d');
            const sortedHistory = [...history].sort((a,b) => new Date(a.date) - new Date(b.date));
            if (chartInstance) chartInstance.destroy();

            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: sortedHistory.map(h => h.date),
                    datasets: [
                        {
                            label: 'Market Value',
                            data: sortedHistory.map(h => h.totalValue),
                            borderColor: '#3b82f6',
                            backgroundColor: 'rgba(59, 130, 246, 0.15)',
                            fill: true,
                            tension: 0.4,
                            pointRadius: 4,
                            pointBackgroundColor: '#3b82f6',
                            borderWidth: 3
                        },
                        {
                            label: 'Total Cost',
                            data: sortedHistory.map(h => h.totalCost),
                            borderColor: '#475569',
                            borderDash: [5, 5],
                            fill: false,
                            tension: 0.4,
                            pointRadius: 0,
                            borderWidth: 2
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { 
                            grid: { display: false }, 
                            ticks: { color: '#64748b', font: { size: 10 } } 
                        },
                        y: { 
                            beginAtZero: false,
                            grid: { color: '#1e293b' },
                            ticks: { color: '#64748b', font: { size: 10 }, callback: (val) => '$' + val.toLocaleString() }
                        }
                    }
                }
            });
        }

        window.onload = renderAll;
    </script>
</body>
</html>
