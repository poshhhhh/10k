<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Portfolio Growth Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-50 text-slate-900 font-sans antialiased">

    <div class="max-w-md mx-auto p-4 min-h-screen flex flex-col">
        <header class="py-6">
            <h1 class="text-2xl font-extrabold tracking-tight text-slate-900">Portfolio Performance</h1>
            <p class="text-sm text-slate-500 font-medium">Total Cost vs. Market Value</p>
        </header>

        <div class="bg-white p-4 rounded-3xl shadow-sm border border-slate-100 mb-6">
            <div class="h-64">
                <canvas id="performanceChart"></canvas>
            </div>
        </div>

        <div class="mb-6">
            <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-3 ml-1">Current Holdings</h3>
            <div id="holdingsList" class="space-y-2">
                </div>
        </div>

        <div id="summaryCards" class="grid grid-cols-2 gap-3 mb-6">
            </div>

        <div class="mt-auto pb-8 space-y-3">
            <button onclick="toggleModal(true)" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-2xl font-bold shadow-lg shadow-blue-100 transition-all active:scale-[0.98]">
                Add or Update Position
            </button>
            <p class="text-center text-xs text-slate-400">Data is stored locally in your browser</p>
        </div>
    </div>

    <div id="modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden items-end sm:items-center justify-center z-50 p-4">
        <div class="bg-white w-full max-w-sm rounded-3xl p-6 shadow-2xl transform transition-all">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold">Update Share</h2>
                <button onclick="toggleModal(false)" class="text-slate-400 hover:text-slate-600">✕</button>
            </div>
            
            <div class="space-y-4">
                <div>
                    <label class="text-xs font-bold text-slate-400 uppercase ml-1">Ticker Symbol</label>
                    <input type="text" id="ticker" placeholder="e.g. NVDA" class="w-full p-4 bg-slate-50 border-none rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="text-xs font-bold text-slate-400 uppercase ml-1">Shares</label>
                        <input type="number" id="shares" placeholder="0.00" class="w-full p-4 bg-slate-50 border-none rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="text-xs font-bold text-slate-400 uppercase ml-1">Cost/Share</label>
                        <input type="number" id="cost" placeholder="0.00" class="w-full p-4 bg-slate-50 border-none rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                </div>
                <div>
                    <label class="text-xs font-bold text-slate-400 uppercase ml-1">Current Market Price</label>
                    <input type="number" id="marketValue" placeholder="0.00" class="w-full p-4 bg-slate-50 border-none rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                
                <button onclick="handleSave()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold mt-2 hover:bg-slate-800 transition-colors">
                    Save Entry
                </button>
            </div>
        </div>
    </div>

    <script>
        let portfolio = JSON.parse(localStorage.getItem('portfolio')) || {};
        let history = JSON.parse(localStorage.getItem('history')) || [];

        function toggleModal(show) {
            const el = document.getElementById('modal');
            el.classList.toggle('hidden', !show);
            el.classList.toggle('flex', show);
        }

        function deletePosition(ticker) {
            if(confirm(`Delete all data for ${ticker}?`)) {
                delete portfolio[ticker];
                localStorage.setItem('portfolio', JSON.stringify(portfolio));
                updateHistoryAndRender();
            }
        }

        function handleSave() {
            const ticker = document.getElementById('ticker').value.toUpperCase().trim();
            const shares = parseFloat(document.getElementById('shares').value);
            const cost = parseFloat(document.getElementById('cost').value);
            const marketValue = parseFloat(document.getElementById('marketValue').value);

            if (!ticker || isNaN(shares) || isNaN(cost)) return alert("Please fill all fields");

            portfolio[ticker] = { shares, cost, marketValue };
            localStorage.setItem('portfolio', JSON.stringify(portfolio));
            
            updateHistoryAndRender();
            toggleModal(false);
            // Reset fields
            document.getElementById('ticker').value = '';
            document.getElementById('shares').value = '';
            document.getElementById('cost').value = '';
            document.getElementById('marketValue').value = '';
        }

        function updateHistoryAndRender() {
            const today = new Date().toLocaleDateString();
            let totalCost = 0;
            let totalValue = 0;

            Object.values(portfolio).forEach(s => {
                totalCost += (s.cost * s.shares);
                totalValue += (s.marketValue * s.shares);
            });

            const historyIdx = history.findIndex(h => h.date === today);
            const entry = { date: today, totalCost, totalValue };

            if (historyIdx > -1) {
                history[historyIdx] = entry;
            } else {
                history.push(entry);
            }

            localStorage.setItem('history', JSON.stringify(history));
            renderAll();
        }

        function renderAll() {
            renderChart();
            renderSummary();
            renderHoldings();
        }

        function renderHoldings() {
            const list = document.getElementById('holdingsList');
            const tickers = Object.keys(portfolio);
            
            if (tickers.length === 0) {
                list.innerHTML = `<p class="text-sm text-slate-400 italic py-4 ml-1">No positions added yet.</p>`;
                return;
            }

            list.innerHTML = tickers.map(ticker => {
                const s = portfolio[ticker];
                const profit = (s.marketValue - s.cost) * s.shares;
                const isProfit = profit >= 0;
                
                return `
                    <div class="bg-white p-4 rounded-2xl border border-slate-100 flex justify-between items-center group">
                        <div>
                            <div class="flex items-center gap-2">
                                <span class="font-bold text-slate-800">${ticker}</span>
                                <span class="text-[10px] bg-slate-100 px-1.5 py-0.5 rounded font-bold text-slate-500">${s.shares} SH</span>
                            </div>
                            <div class="text-[11px] text-slate-400 mt-1">
                                Cost: $${s.cost.toFixed(2)} | Price: $${s.marketValue.toFixed(2)}
                            </div>
                        </div>
                        <div class="flex items-center gap-4">
                            <div class="text-right">
                                <p class="text-sm font-bold ${isProfit ? 'text-emerald-500' : 'text-rose-500'}">
                                    ${isProfit ? '+' : ''}$${profit.toFixed(2)}
                                </p>
                            </div>
                            <button onclick="deletePosition('${ticker}')" class="text-slate-200 hover:text-rose-400 transition-colors">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                                  <path d="M5.5 5.5A.5.5 0 0 1 6 6v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5m2.5 0a.5.5 0 0 1 .5.5v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5m3 .5a.5.5 0 0 0-1 0v6a.5.5 0 0 0 1 0z"/>
                                  <path d="M14.5 3a1 1 0 0 1-1 1H13v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V4h-.5a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1H6a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1h3.5a1 1 0 0 1 1 1zM4.118 4 4 4.059V13a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V4.059L11.882 4zM2.5 3h11V2h-11z"/>
                                </svg>
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderSummary() {
            let totalCost = 0;
            let totalValue = 0;
            Object.values(portfolio).forEach(s => {
                totalCost += (s.cost * s.shares);
                totalValue += (s.marketValue * s.shares);
            });

            document.getElementById('summaryCards').innerHTML = `
                <div class="bg-white p-4 rounded-2xl border border-slate-100">
                    <p class="text-[10px] font-bold text-slate-400 uppercase">Total Cost</p>
                    <p class="text-lg font-bold text-slate-600">$${totalCost.toLocaleString(undefined, {minimumFractionDigits: 2})}</p>
                </div>
                <div class="bg-white p-4 rounded-2xl border border-slate-100">
                    <p class="text-[10px] font-bold text-slate-400 uppercase">Net Value</p>
                    <p class="text-lg font-bold text-blue-600">$${totalValue.toLocaleString(undefined, {minimumFractionDigits: 2})}</p>
                </div>
            `;
        }

        let chartInstance = null;
        function renderChart() {
            const ctx = document.getElementById('performanceChart').getContext('2d');
            const sortedHistory = [...history].sort((a,b) => new Date(a.date) - new Date(b.date));
            if (chartInstance) chartInstance.destroy();

            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: sortedHistory.map(h => h.date),
                    datasets: [
                        {
                            label: 'Market Value',
                            data: sortedHistory.map(h => h.totalValue),
                            borderColor: '#2563eb',
                            backgroundColor: 'rgba(37, 99, 235, 0.1)',
                            fill: true,
                            tension: 0.4,
                            pointRadius: 4,
                            pointBackgroundColor: '#2563eb'
                        },
                        {
                            label: 'Total Cost',
                            data: sortedHistory.map(h => h.totalCost),
                            borderColor: '#94a3b8',
                            borderDash: [5, 5],
                            fill: false,
                            tension: 0.4,
                            pointRadius: 0
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { grid: { display: false }, ticks: { font: { size: 10 } } },
                        y: { 
                            beginAtZero: false,
                            ticks: { font: { size: 10 }, callback: (val) => '$' + val.toLocaleString() }
                        }
                    }
                }
            });
        }

        window.onload = renderAll;
    </script>
</body>
</html>
